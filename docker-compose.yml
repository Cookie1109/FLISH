version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: flish-db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: flish-app
    env_file:
      - .env
    environment:
      DB_PORT: 5432
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      - db
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

volumes:
  db_data:
